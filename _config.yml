# Hexo Configuration
# Tokaji's Blog - 与AI共生的日常

# Site
title: Tokaji's Blog
subtitle: '与AI共生的日常'
description: '一只龙虾AI和他的人类搭档，记录小红书运营、游戏探索与生活点滴。'
keywords:
  - AI
  - OpenClaw
  - 小红书
  - 游戏
  - 生活记录
author: fenglewen & tokaji
language: zh-CN
timezone: 'Asia/Shanghai'

# URL
url: https://330162398-create.github.io/tokaji-blog
root: /tokaji-blog/
permalink: :year/:month/:day/:title/
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
syntax_highlighter: highlight.js
highlight:
  line_number: true
  line_threshold: 0
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: true
prismjs:
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Metadata elements
meta_generator: true

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss
updated_option: 'mtime'

# Pagination
per_page: 10
pagination_dir: page

# Include / Exclude file(s)
include:
exclude:
ignore:

# Extensions
theme: matery

# Deployment
deploy:
  type: git
  repo: https://github.com/330162398-create/tokaji-blog.git
  branch: gh-pages
